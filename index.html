<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>World Strategy Game</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
    margin: 0;
    background: #0b1a2a;
    overflow: hidden;
}

/* карта */
svg {
    width: 100vw;
    height: 100vh;
}

/* държави */
.country {
    fill: #2c3e50;
    stroke: #111;
    stroke-width: 0.5;
    cursor: pointer;
}

/* hover */
.country:hover {
    fill: white;
}

/* claimed */
.claimed {
    fill: #2ecc71 !important;
}

/* текст */
.label {
    fill: white;
    font-size: 10px;
    pointer-events: none;
}

/* info */
#infoBox {
    position: fixed;
    right: 20px;
    top: 20px;
    background: #111;
    color: white;
    padding: 15px;
    border-radius: 10px;
    display: none;
}
</style>
</head>

<body>

<svg></svg>
<div id="infoBox"></div>

<script>
const svg = d3.select("svg");
const g = svg.append("g");

let countries = {};
let zoomLevel = 1;

/* zoom */
svg.call(d3.zoom()
    .scaleExtent([1, 8])
    .on("zoom", (event) => {
        zoomLevel = event.transform.k;
        g.attr("transform", event.transform);

        updateLabels();
    })
);

/* projection */
const projection = d3.geoMercator()
    .scale(150)
    .translate([window.innerWidth / 2, window.innerHeight / 1.5]);

const path = d3.geoPath().projection(projection);

/* load data */
d3.json("world.geojson").then(data => {

    g.selectAll("path")
        .data(data.features)
        .enter()
        .append("path")
        .attr("class", "country")
        .attr("d", path)
        .on("click", (event, d) => selectCountry(d.properties.name))
        .each(function(d){
            countries[d.properties.name] = { owner: null };
        });

    updateLabels();
});

/* labels */
function updateLabels() {
    g.selectAll(".label").remove();

    if (zoomLevel < 2) return;

    g.selectAll(".label")
        .data(Object.keys(countries))
        .enter()
        .append("text")
        .attr("class", "label")
        .attr("x", d => {
            const feature = d3.selectAll("path").data().find(f => f.properties.name === d);
            return path.centroid(feature)[0];
        })
        .attr("y", d => {
            const feature = d3.selectAll("path").data().find(f => f.properties.name === d);
            return path.centroid(feature)[1];
        })
        .text(d => d);
}

/* select */
function selectCountry(name) {
    const box = document.getElementById("infoBox");
    const country = countries[name];

    box.style.display = "block";
    box.innerHTML = `
        <h3>${name}</h3>
        <p>Owner: ${country.owner || "Free"}</p>
        ${!country.owner ? `<button onclick="claimCountry('${name}')">Claim</button>` : ""}
    `;
}

/* claim */
function claimCountry(name) {
    let player = localStorage.getItem("playerName");

    if (!player) {
        player = prompt("Enter your name:");
        localStorage.setItem("playerName", player);
    }

    countries[name].owner = player;

    d3.selectAll("path")
        .filter(d => d.properties.name === name)
        .classed("claimed", true);

    selectCountry(name);
}
</script>

</body>
</html>
