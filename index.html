<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>World Strategy Game</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1a2a;
    color: white;
}

#map {
    width: 100%;
    height: 100vh;
    background: url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');
    background-size: cover;
    position: relative;
}

/* държава */
.country {
    position: absolute;
    padding: 6px 10px;
    background: rgba(0,0,0,0.5);
    cursor: pointer;
    border-radius: 6px;
    transition: 0.2s;
}

/* hover */
.country:hover {
    background: #3498db;
}

/* когато е взета */
.taken {
    background: #e74c3c !important;
}

#infoBox {
    position: fixed;
    right: 20px;
    top: 20px;
    background: #111;
    padding: 15px;
    border-radius: 10px;
    display: none;
    width: 200px;
}
</style>
</head>

<body>

<div id="map">
    <div class="country" style="top:40%; left:45%;" onclick="selectCountry('Bulgaria')">Bulgaria</div>
    <div class="country" style="top:35%; left:50%;" onclick="selectCountry('Ukraine')">Ukraine</div>
    <div class="country" style="top:50%; left:40%;" onclick="selectCountry('Egypt')">Egypt</div>
</div>

<div id="infoBox"></div>

<script>
let countries = {
    Bulgaria: { owner: null },
    Ukraine: { owner: null },
    Egypt: { owner: null }
};

function selectCountry(name) {
    const box = document.getElementById("infoBox");
    const country = countries[name];

    box.style.display = "block";

    box.innerHTML = `
        <h2>${name}</h2>
        <p>Owner: ${country.owner ? country.owner : "Free"}</p>
        ${
            country.owner
            ? ""
            : `<button onclick="claimCountry('${name}')">Claim</button>`
        }
    `;
}

function claimCountry(name) {
    let player = localStorage.getItem("playerName");

    if (!player) {
        player = prompt("Enter your name:");
        localStorage.setItem("playerName", player);
    }

    countries[name].owner = player;

    // оцветяване
    document.querySelectorAll(".country").forEach(el => {
        if (el.innerText === name) {
            el.classList.add("taken");
        }
    });

    selectCountry(name);
}
</script>

</body>
</html>
