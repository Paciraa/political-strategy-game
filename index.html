<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>World Strategy Game</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1a2a;
    color: white;
}

#map {
    width: 100%;
    height: 100vh;
    background: url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');
    background-size: cover;
    position: relative;
}

.country {
    position: absolute;
    padding: 5px 10px;
    background: rgba(0,0,0,0.6);
    cursor: pointer;
    border-radius: 5px;
}

#infoBox {
    position: fixed;
    right: 20px;
    top: 20px;
    background: #111;
    padding: 15px;
    border-radius: 10px;
    display: none;
}
</style>
</head>
<body>

<div id="map">
    <div class="country" style="top:40%; left:45%;" onclick="selectCountry('Bulgaria')">Bulgaria</div>
    <div class="country" style="top:35%; left:50%;" onclick="selectCountry('Ukraine')">Ukraine</div>
    <div class="country" style="top:50%; left:40%;" onclick="selectCountry('Egypt')">Egypt</div>
</div>

<div id="infoBox"></div>

<script>
function selectCountry(name) {
    const box = document.getElementById("infoBox");
    box.style.display = "block";
    box.innerHTML = `
        <h2>${name}</h2>
        <p>Population: ???</p>
        <p>Army: ???</p>
        <button onclick="alert('Soon: claim country')">Claim</button>
    `;
}
</script>

</body>
</html>
